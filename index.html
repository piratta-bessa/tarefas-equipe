<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Nova - Gestão v2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #002855; color: white; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        h2 { text-align: center; letter-spacing: 2px; }
        .sub-titulo { text-align: center; font-size: 0.8em; color: #f39200; font-weight: bold; margin-bottom: 25px; }
        .card, .form-box { background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-action { width: 100%; background: #f39200; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-outline { background: transparent; border: 1px solid #f39200; color: white; width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        .btn-danger { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .hidden { display: none; }
        .item-lista { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h2>CASA NOVA</h2>
    <div class="sub-titulo">LOCAL DE EXPERIÊNCIAS</div>

    <div id="view-login" class="form-box">
        <h3 style="margin-top:0; color:#002855">Login Equipa</h3>
        <input type="text" id="user-name" placeholder="NOME (MAIÚSCULO)">
        <input type="password" id="user-pass" placeholder="SENHA">
        <button class="btn-action" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="view-app" class="hidden">
        <button class="btn-outline" onclick="location.reload()">⬅ SAIR</button>
        
        <div id="panel-admin" class="form-box hidden" style="border-left: 8px solid #002855;">
            <h4 style="color:#002855">1. Novo Colaborador</h4>
            <input type="text" id="new-colab-name" placeholder="Nome">
            <input type="password" id="new-colab-pass" placeholder="Senha">
            <button class="btn-action" id="btn-add-colab" style="background:#002855; margin-bottom:10px;">CADASTRAR</button>
            <div id="lista-colaboradores-admin" style="max-height: 120px; overflow-y: auto;"></div>

            <h4 style="color:#002855; margin-top:20px;">2. Nova Tarefa</h4>
            <input type="text" id="task-name" placeholder="Atividade">
            <select id="task-dest-select"><option value="">Carregando...</option></select>
            <select id="task-freq">
                <option value="diaria">Todo dia</option>
                <option value="Monday">Segunda</option><option value="Tuesday">Terça</option>
                <option value="Wednesday">Quarta</option><option value="Thursday">Quinta</option>
                <option value="Friday">Sexta</option><option value="Saturday">Sábado</option>
                <option value="Sunday">Domingo</option>
            </select>
            <button class="btn-action" id="btn-save-task">ENVIAR TAREFA</button>

            <h4 style="color:#002855; margin-top:20px;">3. Gerir Tarefas</h4>
            <div id="lista-tarefas-admin" style="max-height: 150px; overflow-y: auto;"></div>
        </div>

        <div id="lista-tarefas-colab"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAsuBXKA54vf3OFugGHdgWM1j6TEpzfKns",
        authDomain: "casa-nova-gestao.firebaseapp.com",
        projectId: "casa-nova-gestao",
        storageBucket: "casa-nova-gestao.firebasestorage.app",
        messagingSenderId: "709880753385",
        appId: "1:709880753385:web:1eabd2c9a867c4aa4d9478"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let usuarioLogado = "";

    window.fazerLogin = async function() {
        const nome = document.getElementById('user-name').value.trim().toUpperCase();
        const pass = document.getElementById('user-pass').value;
        if(nome === "ADMIN" && pass === "1234") { usuarioLogado = "ADMIN"; entrarNoApp(true); return; }
        const q = query(collection(db, "usuarios"), where("nome", "==", nome), where("senha", "==", pass));
        const snapshot = await getDocs(q);
        if(!snapshot.empty) { usuarioLogado = nome; entrarNoApp(false); } 
        else { alert("Acesso negado!"); }
    }

    function entrarNoApp(isAdmin) {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-app').classList.remove('hidden');
        if(isAdmin) { escutarUsuarios(); escutarTodasTarefasAdmin(); document.getElementById('panel-admin').classList.remove('hidden'); }
        escutarTarefasColab();
    }

    // GESTÃO DE USUÁRIOS
    document.getElementById('btn-add-colab').onclick = async () => {
        const n = document.getElementById('new-colab-name').value.trim().toUpperCase();
        const s = document.getElementById('new-colab-pass').value;
        if(n && s) await addDoc(collection(db, "usuarios"), { nome: n, senha: s });
        document.getElementById('new-colab-name').value = ""; document.getElementById('new-colab-pass').value = "";
    };

    function escutarUsuarios() {
        onSnapshot(collection(db, "usuarios"), (snapshot) => {
            const lista = document.getElementById('lista-colaboradores-admin');
            const select = document.getElementById('task-dest-select');
            lista.innerHTML = ""; select.innerHTML = '<option value="">Selecionar...</option>';
            snapshot.forEach((uDoc) => {
                const u = uDoc.data();
                lista.innerHTML += `<div class="item-lista"><span>${u.nome}</span><button class="btn-danger" onclick="removerUsuario('${uDoc.id}')">X</button></div>`;
                select.innerHTML += `<option value="${u.nome}">${u.nome}</option>`;
            });
        });
    }

    window.removerUsuario = async (id) => { if(confirm("Remover?")) await deleteDoc(doc(db, "usuarios", id)); };

    // TAREFAS
    function escutarTodasTarefasAdmin() {
        onSnapshot(collection(db, "tarefas"), (snapshot) => {
            const lista = document.getElementById('lista-tarefas-admin');
            lista.innerHTML = "";
            snapshot.forEach((tDoc) => {
                const t = tDoc.data();
                lista.innerHTML += `<div class="item-lista"><span>${t.nome} (${t.responsavel})</span><button class="btn-danger" onclick="removerTarefa('${tDoc.id}')">X</button></div>`;
            });
        });
    }

    window.removerTarefa = async (id) => { if(confirm("Apagar tarefa?")) await deleteDoc(doc(db, "tarefas", id)); };

    document.getElementById('btn-save-task').onclick = async () => {
        const n = document.getElementById('task-name').value;
        const p = document.getElementById('task-dest-select').value;
        const f = document.getElementById('task-freq').value;
        if(n && p) await addDoc(collection(db, "tarefas"), { nome: n, responsavel: p, freq: f, ultimaConclusao: "" });
        document.getElementById('task-name').value = "";
    };

    function escutarTarefasColab() {
        const dias = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const hojeNome = dias[new Date().getDay()];
        const hojeDataISO = new Date().toISOString().split('T')[0];

        const q = query(collection(db, "tarefas"), where("responsavel", "==", usuarioLogado));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('lista-tarefas-colab');
            container.innerHTML = `<h3 style="color:#f39200; text-align:center">Minhas Atividades</h3>`;
            snapshot.forEach((tDoc) => {
                const t = tDoc.data();
                if((t.freq === 'diaria' || t.freq === hojeNome) && t.ultimaConclusao !== hojeDataISO) {
                    container.innerHTML += `<div class="card"><span><strong>${t.nome}</strong></span><button class="btn-action" style="width:auto;" onclick="concluirTarefa('${tDoc.id}', '${t.nome}')">OK</button></div>`;
                }
            });
        });
    }

    window.concluirTarefa = async (id, nome) => {
        const hojeDataISO = new Date().toISOString().split('T')[0];
        await updateDoc(doc(db, "tarefas", id), { ultimaConclusao: hojeDataISO });
        window.open(`https://wa.me/5562981962102?text=${encodeURIComponent("🏠 CASA NOVA\n✅ "+usuarioLogado+" concluiu: "+nome)}`, '_blank');
    };
</script>
</body>
</html>
